<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>IGA — Influencer Global Agency</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#fff;overflow-x:hidden;cursor:none}
::selection{background:rgba(232,67,122,.2)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(232,67,122,.45);border-radius:4px}
:root{
  --pink:#e8437a;--purple:#7c3aed;--orange:#f97316;
  --cream:#faf7f2;--cream2:#f3ede3;--cream3:#e8dfd0;
  --dark:#0a0a0f;--dark2:#111118;--text:#16161e;--muted:#5c5c78;
  --grad:linear-gradient(135deg,#e8437a 0%,#7c3aed 55%,#f97316 100%);
}

/* Cursor */
#cd{position:fixed;width:6px;height:6px;background:var(--pink);border-radius:50%;pointer-events:none;z-index:9999;top:-20px;left:-20px;transform:translate(-50%,-50%)}
#cr{position:fixed;width:28px;height:28px;border:1px solid rgba(232,67,122,.35);border-radius:50%;pointer-events:none;z-index:9998;top:-20px;left:-20px;transform:translate(-50%,-50%);transition:top .09s ease,left .09s ease}

/* Nav */
#nav{position:fixed;top:0;left:0;right:0;z-index:500;transition:background .4s,border-color .4s}
#nav.scrolled{background:rgba(10,10,15,.88);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.05)}
#nav.light.scrolled{background:rgba(250,247,242,.93);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.07)}
.ni{max-width:1160px;margin:0 auto;padding:0 48px;height:66px;display:flex;align-items:center;justify-content:space-between;gap:32px}
.logo{font-size:19px;font-weight:900;letter-spacing:-.5px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;cursor:pointer;border:none;background-color:transparent;font-family:'Inter',sans-serif}
.nl{display:flex;align-items:center;gap:32px}
.nl a{font-size:13px;font-weight:500;color:rgba(255,255,255,.52);cursor:pointer;text-decoration:none;transition:color .2s;background:none;border:none;font-family:'Inter',sans-serif}
.nl a:hover,.nl a.on{color:#fff}
#nav.light .nl a{color:rgba(22,22,30,.48)}
#nav.light .nl a:hover,#nav.light .nl a.on{color:var(--text)}
.nc{display:flex;align-items:center;gap:10px}
#hbtn{display:none;background:none;border:none;cursor:pointer;color:#fff;padding:4px}
#mob{display:none;background:rgba(10,10,15,.97);backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,.05);padding:8px 48px 28px}
#mob.open{display:block}
.ml{display:block;width:100%;text-align:left;padding:13px 0;font-size:14px;font-weight:500;color:rgba(255,255,255,.6);background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;border-bottom:1px solid rgba(255,255,255,.04)}
.ml:hover{color:#fff}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;border-radius:100px;font-family:'Inter',sans-serif;font-weight:600;cursor:pointer;transition:transform .18s,box-shadow .18s;white-space:nowrap;letter-spacing:-.01em;line-height:1}
.btn:active{transform:scale(.96)!important}
.bg{background:var(--grad);color:#fff;box-shadow:0 4px 20px rgba(232,67,122,.25)}
.bg:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 8px 32px rgba(232,67,122,.42)}
.bgh{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.2)}
.bgh:hover{border-color:rgba(255,255,255,.55);transform:translateY(-1px)}
.boc{background:transparent;color:var(--text);border:1.5px solid rgba(0,0,0,.14);border-radius:100px}
.boc:hover{border-color:var(--pink);color:var(--pink);transform:translateY(-1px)}
.sm{padding:9px 20px;font-size:12.5px}
.md{padding:12px 26px;font-size:13.5px}
.lg{padding:14px 36px;font-size:14.5px}

/* Layout */
.w{max-width:1160px;margin:0 auto;padding:0 48px}
.wm{max-width:960px;margin:0 auto;padding:0 48px}
.ws{max-width:720px;margin:0 auto;padding:0 48px}
.sec{padding:120px 0}
.secsm{padding:64px 0}

/* Grids */
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px}
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px}

/* Cards */
.gl{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:20px;transition:border-color .3s}
.gl:hover{border-color:rgba(255,255,255,.12)}
.cc{background:#fff;border:1px solid rgba(0,0,0,.05);border-radius:18px;box-shadow:0 2px 14px rgba(0,0,0,.05);transition:transform .28s,box-shadow .28s}
.cc:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,.1)}

/* Typography helpers */
.gt{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ew{display:block;font-size:10.5px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--pink);margin-bottom:18px}

/* Orbs */
.orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.12;pointer-events:none;animation:orbf 18s ease-in-out infinite}
@keyframes orbf{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-48px) scale(1.05)}}

/* Ticker */
.tkw{overflow:hidden;white-space:nowrap;padding:17px 0;border-top:1px solid rgba(255,255,255,.045);border-bottom:1px solid rgba(255,255,255,.045)}
.tkt{display:inline-flex;animation:tks 32s linear infinite}
.tki{display:inline-flex;align-items:center;gap:10px;padding:0 48px;font-size:11.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.32)}
@keyframes tks{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* Hero */
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:144px 48px 96px;position:relative;overflow:hidden}
.hero h1{font-size:clamp(46px,6.5vw,82px);font-weight:900;line-height:1.03;letter-spacing:-3px;color:#fff}
.sub{font-size:clamp(15px,1.6vw,17.5px);color:rgba(255,255,255,.46);max-width:480px;margin:28px auto 0;line-height:1.82;letter-spacing:-.01em}

/* Floating cards */
.fc{position:absolute;border-radius:14px;padding:14px 18px;pointer-events:none;min-width:130px;border:1px solid rgba(255,255,255,.07);background:rgba(20,20,28,.7);backdrop-filter:blur(16px)}
.fv{font-size:21px;font-weight:900;letter-spacing:-.5px;line-height:1.1}
.fs{font-size:10px;color:rgba(255,255,255,.38);margin-top:5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}

/* Stats */
.stc{border-radius:16px;padding:22px 16px;text-align:center}
.stv{font-size:clamp(24px,3.5vw,38px);font-weight:900;letter-spacing:-1px;line-height:1}
.stl{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-top:8px}

/* Pill */
.pill{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.09);border-radius:100px;padding:7px 18px;font-size:11.5px;font-weight:600;color:rgba(255,255,255,.58);margin-bottom:36px}
.pd{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:pdp 2s ease-in-out infinite;flex-shrink:0}
@keyframes pdp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}

/* Logo card */
.lc{border-radius:16px;padding:24px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;transition:transform .25s}
.lc:hover{transform:translateY(-4px) scale(1.025)}

/* Review */
.rc{border-radius:18px;padding:28px;transition:transform .28s,box-shadow .28s}
.rc:hover{transform:translateY(-5px);box-shadow:0 20px 56px rgba(0,0,0,.2)}
.stars{display:flex;gap:2px;margin-bottom:14px}

/* CTA band */
.ctab{border-radius:24px;padding:80px 64px;text-align:center;position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(232,67,122,.09),rgba(124,58,237,.09),rgba(249,115,22,.06));border:1px solid rgba(232,67,122,.13)}

/* Dividers */
.hrd{height:1px;background:rgba(255,255,255,.05);border:none;margin:0}
.hrl{height:1px;background:rgba(0,0,0,.07);border:none;margin:0}
.stripe{height:4px;background:var(--grad)}

/* Cream pages */
.cream-page{background:var(--cream);color:var(--text)}
.cphr{padding:144px 48px 88px;text-align:center}
.cream-page h1{font-size:clamp(36px,5.5vw,66px);font-weight:900;letter-spacing:-2.5px;line-height:1.05;color:var(--text)}
.cream-page h2{font-size:clamp(26px,3.8vw,46px);font-weight:800;letter-spacing:-1.5px;line-height:1.1;color:var(--text)}
.cream-page h3{font-size:16.5px;font-weight:700;color:var(--text);margin-bottom:8px;letter-spacing:-.2px}
.cream-page p{color:#4e4e62;line-height:1.8;font-size:14.5px}
.cream-page .sec{padding:96px 0}

/* Forms */
.fw{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.075);border-radius:24px;padding:52px 48px}
.fl{display:block;font-size:10px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;margin-bottom:8px;color:rgba(255,255,255,.38)}
.fi{width:100%;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.09);border-radius:11px;padding:12px 15px;color:#fff;font-size:13.5px;outline:none;transition:border-color .2s,background .2s;font-family:'Inter',sans-serif}
.fi:focus{border-color:rgba(232,67,122,.5);background:rgba(255,255,255,.08)}
.fi::placeholder{color:rgba(255,255,255,.18)}
.fse{width:100%;background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.09);border-radius:11px;padding:12px 15px;color:#fff;font-size:13.5px;outline:none;cursor:pointer;font-family:'Inter',sans-serif;-webkit-appearance:none;appearance:none}
.fse option{background:#18181f;color:#fff}
.fgr{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:18px}
.ffld{display:flex;flex-direction:column;margin-bottom:18px}
.fsh{font-size:9.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.25);border-bottom:1px solid rgba(255,255,255,.06);padding-bottom:11px;margin:36px 0 20px}
.chg{display:flex;flex-wrap:wrap;gap:7px;margin-top:6px}
.ch{padding:7px 14px;border-radius:100px;font-size:11.5px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.11);color:rgba(255,255,255,.46);background:transparent;font-family:'Inter',sans-serif;transition:all .18s}
.ch:hover{border-color:rgba(255,255,255,.3);color:rgba(255,255,255,.8)}
.ch.on{background:var(--grad);border-color:transparent;color:#fff}

/* Toast */
.tst{position:fixed;bottom:28px;right:28px;z-index:9000;background:#fff;color:var(--text);border-radius:14px;padding:14px 22px;box-shadow:0 16px 48px rgba(0,0,0,.18);display:flex;align-items:center;gap:12px;font-size:13.5px;font-weight:600;animation:tstin .35s ease;max-width:360px}
@keyframes tstin{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Footer */
.ftr{background:var(--dark2);border-top:1px solid rgba(255,255,255,.05);padding:84px 0 40px}
.ftrg{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:56px}
.flink{display:block;background:none;border:none;cursor:pointer;font-size:13px;color:rgba(255,255,255,.33);padding:5px 0;font-family:'Inter',sans-serif;transition:color .2s;text-align:left}
.flink:hover{color:rgba(255,255,255,.8)}
.flbl{font-size:9.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.2);margin-bottom:18px}
.sb{width:34px;height:34px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;color:rgba(255,255,255,.38)}
.sb:hover{background:rgba(232,67,122,.12);border-color:rgba(232,67,122,.28);color:var(--pink)}

/* Legal */
.lc2 h2{font-size:19px;font-weight:700;margin:36px 0 10px;color:var(--text)}
.lc2 h3{font-size:15px;font-weight:600;margin:20px 0 6px;color:var(--text)}
.lc2 p{margin-bottom:14px;font-size:14.5px;line-height:1.82;color:#4e4e62}
.lc2 ul{margin:10px 0 14px 22px;list-style:disc}
.lc2 li{font-size:14.5px;line-height:1.8;color:#4e4e62;margin-bottom:5px}
.lc2 a{color:var(--pink);text-decoration:none}
.lc2 a:hover{text-decoration:underline}

/* Thank you */
.ty{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:80px 24px;background:var(--dark)}

/* Page anim */
.pin{animation:pin .38s ease}
@keyframes pin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Mobile */
@media(max-width:860px){
  .nl,.nc{display:none}
  #hbtn{display:flex}
  .hero{padding:108px 24px 80px}
  .hero h1{letter-spacing:-2px}
  .fc{display:none}
  .w,.wm,.ws{padding:0 24px}
  .sec{padding:80px 0}
  .secsm{padding:48px 0}
  .cphr{padding:120px 24px 72px}
  .ftrg{grid-template-columns:1fr 1fr;gap:36px}
  .fw{padding:32px 24px}
  .g2,.g3,.g4{grid-template-columns:1fr}
  .ctab{padding:48px 28px}
  .ni{padding:0 24px}
  #mob{padding:8px 24px 28px}
}
</style>
</head>
<body>

<div id="cd"></div>
<div id="cr"></div>

<header id="nav">
  <div class="ni">
    <button class="logo" onclick="go('home')">IGA</button>
    <nav class="nl">
      <a data-p="home" onclick="go('home')">Home</a>
      <a data-p="brands" onclick="go('brands')">Brands</a>
      <a data-p="creators" onclick="go('creators')">Creators</a>
      <a data-p="about" onclick="go('about')">About</a>
      <a data-p="case-studies" onclick="go('case-studies')">Work</a>
    </nav>
    <div class="nc">
      <button class="btn bgh sm" onclick="go('brand-form')">Book a Call</button>
      <button class="btn bg sm" onclick="go('creator-form')">Apply as Creator</button>
    </div>
    <button id="hbtn" onclick="togMob()"><i class="ti ti-menu-2" style="font-size:20px"></i></button>
  </div>
  <div id="mob">
    <button class="ml" onclick="go('home');cMob()">Home</button>
    <button class="ml" onclick="go('brands');cMob()">Brands</button>
    <button class="ml" onclick="go('creators');cMob()">Creators</button>
    <button class="ml" onclick="go('about');cMob()">About</button>
    <button class="ml" onclick="go('case-studies');cMob()">Work</button>
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:20px">
      <button class="btn bg md" onclick="go('brand-form');cMob()">Book a Brand Call</button>
      <button class="btn bgh md" onclick="go('creator-form');cMob()">Apply as Creator</button>
    </div>
  </div>
</header>

<main id="app"></main>

<footer class="ftr" id="ftr">
  <div class="w">
    <div class="ftrg">
      <div>
        <div class="gt" style="font-size:22px;font-weight:900;margin-bottom:16px">IGA</div>
        <p style="font-size:13px;color:rgba(255,255,255,.32);line-height:1.8;max-width:220px">Influencer Global Agency — where brands meet the creators who move culture.</p>
        <div style="display:flex;gap:9px;margin-top:22px">
          <div class="sb"><i class="ti ti-brand-instagram" style="font-size:14px"></i></div>
          <div class="sb"><i class="ti ti-brand-tiktok" style="font-size:14px"></i></div>
          <div class="sb"><i class="ti ti-brand-linkedin" style="font-size:14px"></i></div>
        </div>
      </div>
      <div>
        <div class="flbl">Company</div>
        <button class="flink" onclick="go('home')">Home</button>
        <button class="flink" onclick="go('about')">About</button>
        <button class="flink" onclick="go('case-studies')">Our Work</button>
        <button class="flink" onclick="go('brands')">Brands</button>
        <button class="flink" onclick="go('creators')">Creators</button>
      </div>
      <div>
        <div class="flbl">Work With Us</div>
        <button class="flink" onclick="go('brand-form')">Book a Brand Call</button>
        <button class="flink" onclick="go('creator-form')">Apply as Creator</button>
        <button class="flink" onclick="go('case-studies')">Case Studies</button>
      </div>
      <div>
        <div class="flbl">Legal</div>
        <button class="flink" onclick="go('privacy')">Privacy Policy</button>
        <button class="flink" onclick="go('terms')">Terms of Service</button>
        <button class="flink" onclick="go('accessibility')">Accessibility</button>
        <button class="flink" onclick="go('creator-agreement')">Creator Agreement</button>
      </div>
    </div>
    <div style="margin-top:56px;padding-top:24px;border-top:1px solid rgba(255,255,255,.05);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <p style="color:rgba(255,255,255,.16);font-size:12px">© 2025 Influencer Global Agency LLC. All rights reserved.</p>
      <p style="color:rgba(255,255,255,.16);font-size:12px">hello@influencerglobalagency.com</p>
    </div>
  </div>
</footer>

<div id="tst" class="tst" style="display:none"></div>

<script>
const RESEND_KEY='re_e6WEjT8d_KF6dU9P2RRctbd8sf5n6Qny2';
const TO=['carly@influencerglobalagency.com','hello@influencerglobalagency.com'];

const BRANDS=[
  {name:'Sol Brush',url:'solbrush.com',color:'#f97316',icon:'ti-brush'},
  {name:'Rae Basics',url:'raebasics.com',color:'#7c3aed',icon:'ti-sparkles'},
  {name:'Accident Avenue',url:'accidentavenue.com',color:'#e8437a',icon:'ti-road'},
  {name:'Miss Debbie',url:'missdebbie.co',color:'#f59e0b',icon:'ti-heart'},
];

const REVIEWS=[
  {brand:'Sol Brush',person:'Emma R.',role:'Founder & CEO',text:'IGA completely transformed our creator program. Within 90 days we had 40+ UGC creators producing weekly content and our TikTok revenue tripled.'},
  {brand:'Rae Basics',person:'Jordan T.',role:'Head of Marketing',text:"We'd burned out our team trying to manage influencers in-house. IGA built an entire affiliate infrastructure from scratch. We now generate recurring commission revenue every single month."},
  {brand:'Accident Avenue',person:'Marcus L.',role:'Co-Founder',text:'The ROI has been insane. We get authentic creator content that converts better than anything our paid agency produced. IGA finds creators who actually care about the product.'},
  {brand:'Miss Debbie',person:'Deborah K.',role:'Owner',text:"I was skeptical about influencer marketing but IGA proved me wrong. They found perfect micro-creators for my audience and our first campaign drove more sales than our entire last quarter."},
  {brand:'Sol Brush',person:'Tyler W.',role:'VP Growth',text:"What separates IGA is they're obsessed with revenue, not just engagement. Every creator they bring us is vetted against our actual customer profile. It shows in the numbers."},
];

// ─── Router ───────────────────────────────────────────────────
const LIGHT=['brands','creators','about','case-studies','privacy','terms','accessibility','creator-agreement'];
const NOFOOT=['brand-form','creator-form','brand-ty','creator-ty'];

function go(p){
  const app=document.getElementById('app');
  app.innerHTML='';app.className='pin';
  const nav=document.getElementById('nav');
  nav.classList.toggle('light',LIGHT.includes(p));
  document.querySelectorAll('.nl a').forEach(a=>a.classList.toggle('on',a.dataset.p===p));
  document.getElementById('ftr').style.display=NOFOOT.includes(p)?'none':'';
  app.appendChild((PG[p]||PG.home)());
  window.scrollTo({top:0,behavior:'smooth'});
  setTimeout(initCounters,80);
}
function togMob(){document.getElementById('mob').classList.toggle('open')}
function cMob(){document.getElementById('mob').classList.remove('open')}
window.addEventListener('scroll',()=>document.getElementById('nav').classList.toggle('scrolled',scrollY>20));

// ─── Cursor ───────────────────────────────────────────────────
(()=>{
  const d=document.getElementById('cd'),r=document.getElementById('cr');
  document.addEventListener('mousemove',e=>{
    d.style.left=e.clientX+'px';d.style.top=e.clientY+'px';
    setTimeout(()=>{r.style.left=e.clientX+'px';r.style.top=e.clientY+'px'},80);
  });
})();

// ─── Toast ────────────────────────────────────────────────────
let _tt;
function showToast(msg,ok=false){
  const t=document.getElementById('tst');
  t.innerHTML=`<div style="width:28px;height:28px;background:${ok?'linear-gradient(135deg,#e8437a,#7c3aed)':'#ef4444'};border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="ti ti-${ok?'check':'alert-circle'}" style="font-size:14px;color:#fff"></i></div><span>${msg}</span>`;
  t.style.display='flex';clearTimeout(_tt);_tt=setTimeout(()=>t.style.display='none',5000);
}

// ─── Counters ─────────────────────────────────────────────────
function initCounters(){
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(!e.isIntersecting)return;
      const el=e.target,tgt=+el.dataset.t,pre=el.dataset.pre||'',suf=el.dataset.suf||'';
      let s=null;
      (function step(ts){if(!s)s=ts;const p=Math.min((ts-s)/1500,1),ease=1-Math.pow(1-p,3),v=Math.round(ease*tgt);el.textContent=pre+(v>=1000?v.toLocaleString():v)+suf;if(p<1)requestAnimationFrame(step);})(performance.now());
      obs.unobserve(el);
    });
  },{threshold:.3});
  document.querySelectorAll('.cnt').forEach(el=>obs.observe(el));
}

// ─── 3D tilt ──────────────────────────────────────────────────
function tilt(el,str=6){
  el.addEventListener('mousemove',e=>{
    const r=el.getBoundingClientRect(),dx=(e.clientX-r.left-r.width/2)/r.width,dy=(e.clientY-r.top-r.height/2)/r.height;
    el.style.transform=`perspective(700px) rotateY(${dx*str}deg) rotateX(${-dy*str}deg) translateZ(5px)`;
    el.style.transition='transform .07s ease';
  });
  el.addEventListener('mouseleave',()=>{el.style.transform='';el.style.transition='transform .5s ease';});
}

// ─── Email via Resend ─────────────────────────────────────────
async function sendEmail(data,isBrand){
  const rows=Object.entries(data).filter(([k])=>k!=='consent').map(([k,v])=>{
    const lbl=k.replace(/([A-Z])/g,' $1').replace(/^./,s=>s.toUpperCase());
    const val=Array.isArray(v)?(v.length?v.join(', '):'—'):(v||'—');
    return `<tr><td style="padding:8px 12px;font-weight:600;color:#555;white-space:nowrap;vertical-align:top;border-bottom:1px solid #f0f0f0;width:180px">${lbl}</td><td style="padding:8px 12px;color:#222;border-bottom:1px solid #f0f0f0">${val}</td></tr>`;
  }).join('');
  const subject=isBrand?`New Brand Application — ${data.brandName||'Unknown'}`:`New Creator Application — ${data.fullName||'Unknown'}`;
  const html=`<div style="font-family:Inter,sans-serif;max-width:660px;margin:0 auto;background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e8e8e8"><div style="background:linear-gradient(135deg,#e8437a,#7c3aed,#f97316);padding:28px 36px"><div style="font-size:20px;font-weight:900;color:#fff">IGA</div><div style="font-size:17px;font-weight:700;color:rgba(255,255,255,.9);margin-top:6px">${isBrand?'New Brand Application':'New Creator Application'}</div></div><div style="padding:28px 36px"><p style="font-size:14px;color:#444;margin:0 0 20px">A new ${isBrand?'brand strategy call request':'creator application'} was submitted via the IGA website.</p><table style="width:100%;border-collapse:collapse;font-size:13.5px;background:#fafafa;border-radius:8px;overflow:hidden">${rows}</table><div style="margin-top:24px;padding:14px 18px;background:#fdf4f7;border-left:4px solid #e8437a;border-radius:4px"><p style="font-size:12px;color:#999;margin:0">Submitted via influencerglobalagency.com · ${new Date().toLocaleString('en-US',{dateStyle:'full',timeStyle:'short'})}</p></div></div></div>`;
  const res=await fetch('https://api.resend.com/emails',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${RESEND_KEY}`},body:JSON.stringify({from:'IGA Website <onboarding@resend.dev>',to:TO,subject,html})});
  if(!res.ok){const err=await res.json();console.error('Resend error:',err);throw new Error('Email failed');}

function mk(tag,opts={},...kids){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(opts)){
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k==='class')e.className=v;
    else if(k==='html')e.innerHTML=v;
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  kids.flat().forEach(c=>{if(c==null)return;e.appendChild(typeof c==='string'?document.createTextNode(c):c);});
  return e;
}

    s.addEventListener('change',()=>{D[key]=s.value;});

  function block(f){fw.appendChild(f);}

// CREATOR FORM
PG['creator-form']=function(){
  const root=mk('div',{style:{minHeight:'100vh',padding:'100px 20px 80px',background:'var(--dark)',position:'relative'}});
  root.appendChild(mk('div',{class:'orb',style:{width:'440px',height:'440px',background:'radial-gradient(#7c3aed,transparent)',top:'-80px',left:'-80px',position:'absolute',pointerEvents:'none'}}));
  const cont=mk('div',{style:{maxWidth:'680px',margin:'0 auto',position:'relative',zIndex:'1'}});
  const hd=d('',{textAlign:'center',marginBottom:'52px'});
  hd.appendChild(mk('span',{class:'ew'},'Creator Application'));
  hd.appendChild(mk('h1',{style:{fontSize:'clamp(28px,4vw,44px)',fontWeight:'900',color:'#fff',letterSpacing:'-1.5px',lineHeight:'1.08',marginBottom:'12px'}},'Join the IGA Creator Network'));
  hd.appendChild(p('Apply once. Get matched with brand campaigns continuously.',{color:'rgba(255,255,255,.42)',fontSize:'15px',lineHeight:'1.75'}));
  cont.appendChild(hd);
  const fw=mk('div',{class:'fw'});
  const D={consent:false};const CS={};
  function sh(t){fw.appendChild(mk('div',{class:'fsh'},t));}
  function fi(label,key,type='text',ph=''){
    D[key]='';const w=mk('div',{class:'ffld'});w.appendChild(mk('label',{class:'fl'},label));
    const i=mk(type==='textarea'?'textarea':'input',{class:'fi',placeholder:ph});
    if(type!=='textarea')i.type=type;else{i.rows=3;i.style.resize='vertical';}
    i.addEventListener('input',()=>{D[key]=i.value;});w.appendChild(i);return w;
  }
  function fsel(label,key,opts){
    D[key]='';const w=mk('div',{class:'ffld'});w.appendChild(mk('label',{class:'fl'},label));
    const s=mk('select',{class:'fse'});s.appendChild(mk('option',{value:''},'Select…'));
    opts.forEach(o=>s.appendChild(mk('option',{value:o},o)));s.addEventListener('change',()=>{D[key]=s.value;});w.appendChild(s);return w;
  }
  function fchips(label,key,opts){
    CS[key]=[];D[key]=[];const w=mk('div',{style:{marginBottom:'22px'}});w.appendChild(mk('label',{class:'fl'},label));
    const g=mk('div',{class:'chg'});
    opts.forEach(o=>{const c=mk('button',{class:'ch',type:'button'},o);c.addEventListener('click',()=>{const on=CS[key].includes(o);if(on){CS[key]=CS[key].filter(v=>v!==o);c.classList.remove('on');}else{CS[key].push(o);c.classList.add('on');}D[key]=[...CS[key]];});g.appendChild(c);});
    w.appendChild(g);fw.appendChild(w);
  }
  function grid(...fields){const g=mk('div',{class:'fgr'});fields.forEach(f=>{if(f)g.appendChild(f);});fw.appendChild(g);}
  function block(f){fw.appendChild(f);}
  sh('Personal Info');
  grid(fi('Full Name','fullName','text','Your Name'),fi('Email','email','email','you@email.com'));
  grid(fi('Phone','phone','tel','+1 (555) 000-0000'),fi('City / State / Country','location','text','Los Angeles, CA'));
  grid(fsel('Age Range','ageRange',['18–24','25–34','35–44','45–54','55+']));
  sh('Social Platforms');
  grid(fi('Instagram Handle','instagram','text','@handle'),fi('TikTok Handle','tiktok','text','@handle'));
  grid(fi('YouTube Channel','youtube','text','Channel or URL'),fi('Facebook','facebook','text','Profile or page URL'));
  grid(fi('X / Twitter','twitter','text','@handle'),fi('LinkedIn','linkedin','text','Profile URL'));
  grid(fi('Other Platforms','otherPlatforms','text','Substack, Pinterest…'),fi('Total Following (all platforms)','totalFollowing','text','e.g. 45,000'));
  grid(fi('Avg Views per Post','avgViews','text','e.g. 10,000'),fi('Engagement Rate','engagementRate','text','e.g. 4.2%'));
  fchips('Your Content Categories','categories',['Beauty','Fashion','Fitness','Health/Wellness','Faith','Family','Lifestyle','Business','Finance','Tech','Food','Travel','Home','Parenting','Comedy','Education','Other']);
  fchips('Campaign Interests','campaignInterests',['UGC','Affiliate','Brand Deals','Commission-Based','Flat Rate','Long-Term Management','Ambassador Programs','Product Seeding','TikTok Shop','Other']);
  sh('Experience');
  grid(fsel('Worked with brands before?','workedWithBrands',['Yes, many times','Yes, a few times','Once or twice','Not yet']),fi('Past Brands / Partnerships','pastBrands','text','Brand names…'));
  grid(fi('Media Kit Link','mediaKit','text','https://…'),fi('Portfolio Link','portfolio','text','https://…'));
  grid(fi('Typical Rates','typicalRates','text','e.g. $500/reel'),fsel('Open to commission-only?','openCommission',['Yes','No','Maybe']));
  grid(fsel('Open to gifted/product?','openGifted',['Yes','No','Depends']),fsel('Open to creator management?','openManagement',['Yes','No','Tell me more']));
  block(fi('Brands you WANT to work with','brandTypes','textarea','Niches, industries, specific brands…'));
  block(fi("Brands you WON'T work with",'excludeBrands','textarea','Any hard restrictions…'));
  block(fi('Why do you want to work with IGA?','whyIGA','textarea','Tell us about your goals…'));
  sh('Logistics (Optional)');
  grid(fi('Shipping Address','shippingAddress','text','For gifted campaigns'),fi('Payment Preference','paymentPref','text','PayPal, Venmo, ACH…'));
  grid(fsel('Preferred Contact Method','contactMethod',['Email','Text / SMS','Instagram DM','TikTok DM','WhatsApp']));
  const cr=d('',{display:'flex',alignItems:'flex-start',gap:'14px',background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.07)',borderRadius:'13px',padding:'18px 20px',marginTop:'8px'});
  const cb=mk('input',{type:'checkbox',id:'cbc',style:{marginTop:'2px',width:'15px',height:'15px',accentColor:'var(--pink)',flexShrink:'0',cursor:'pointer'}});
  cb.addEventListener('change',()=>{D.consent=cb.checked;});
  const cbl=mk('label',{for:'cbc',style:{color:'rgba(255,255,255,.48)',fontSize:'13px',lineHeight:'1.65',cursor:'pointer'}});
  cbl.innerHTML='I consent to Influencer Global Agency contacting me about brand campaigns and opportunities. I can opt out at any time. I agree to the <span style="color:var(--pink);cursor:pointer" onclick="go(\'creator-agreement\')">Creator Agreement</span>.';
  cr.appendChild(cb);cr.appendChild(cbl);fw.appendChild(cr);
  const sbtn=mk('button',{class:'btn bg lg',style:{width:'100%',borderRadius:'14px',marginTop:'28px',justifyContent:'center',background:'linear-gradient(135deg,#7c3aed,#e8437a,#f97316)'}},'Submit Creator Application →');
  sbtn.addEventListener('click',async()=>{
    if(!D.fullName||!D.email){showToast('Please fill required fields.');return;}
    if(!D.consent){showToast('Please agree to the creator agreement.');return;}
    await submitForm(D,sbtn,'creator-ty',false);
  });
  fw.appendChild(sbtn);
  const ln=mk('p',{style:{textAlign:'center',color:'rgba(255,255,255,.2)',fontSize:'11.5px',marginTop:'12px'}});
  ln.innerHTML='<i class="ti ti-lock" style="font-size:10px;margin-right:4px"></i>Your information is secure and will never be shared without your consent.';
  fw.appendChild(ln);
  cont.appendChild(fw);root.appendChild(cont);return root;
};

:privacy@influencerglobalagency.com">privacy@influencerglobalagency.com</a></p>`);
