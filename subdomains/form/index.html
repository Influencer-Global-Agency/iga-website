<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Apply — Influencer Global Agency</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:#0a0a0f;color:#fff;-webkit-font-smoothing:antialiased;overflow:hidden}
:root{--pink:#e8437a;--purple:#7c3aed;--orange:#f97316;--grad:linear-gradient(135deg,#e8437a 0%,#7c3aed 55%,#f97316 100%)}
.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0}
.g1{position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(249,115,22,.14) 0%,transparent 70%);bottom:-150px;right:-100px}
.g2{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,.16) 0%,transparent 70%);top:-60px;left:-60px}
.wrap{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.2);border-radius:100px;padding:6px 16px;font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#fb923c;margin-bottom:32px}
.dot{width:6px;height:6px;border-radius:50%;background:#fb923c;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
h1{font-size:clamp(40px,8vw,80px);font-weight:900;letter-spacing:-2px;line-height:1;margin-bottom:20px}
.grad-text{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
p{font-size:clamp(15px,2vw,18px);color:rgba(255,255,255,.5);max-width:480px;line-height:1.7;margin-bottom:40px}
.pill-row{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:48px}
.pill{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:100px;padding:8px 18px;font-size:13px;color:rgba(255,255,255,.6)}
.back{display:inline-flex;align-items:center;gap:6px;color:rgba(255,255,255,.35);font-size:13px;font-weight:500;text-decoration:none;transition:color .2s}
.back:hover{color:#fff}
</style>
</head>
<body>
<div class="bg-glow"><div class="g1"></div><div class="g2"></div></div>
<div class="wrap">
  <div class="badge"><div class="dot"></div>Applications Open Soon</div>
  <h1><span class="grad-text">Join IGA</span></h1>
  <p>Ready to take your influence to the next level? Our talent application is opening soon. Be the first to apply.</p>
  <div class="pill-row">
    <div class="pill">Talent Roster</div>
    <div class="pill">Brand Deals</div>
    <div class="pill">Strategy & Growth</div>
    <div class="pill">Management</div>
  </div>
  <a class="back" href="https://www.influencerglobalagency.com">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Back to IGA
  </a>
</div>
</body>
</html>
