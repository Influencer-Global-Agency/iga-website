<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IGA App - Creator Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }
  .bg-blob { position: fixed; border-radius: 50%; filter: blur(120px); opacity: 0.15; pointer-events: none; z-index: 0; }
  .blob1 { width: 600px; height: 600px; background: #e8437a; top: -200px; right: -100px; }
  .blob2 { width: 500px; height: 500px; background: #7c3aed; bottom: -150px; left: -100px; }
  nav { position: relative; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 24px 48px; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .logo { font-size: 20px; font-weight: 800; background: linear-gradient(135deg, #e8437a, #7c3aed, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
  .nav-link { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; }
  .main { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 81px); padding: 60px 24px; }
  .badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.3); border-radius: 100px; padding: 6px 16px; font-size: 12px; font-weight: 600; color: #a78bfa; margin-bottom: 28px; text-transform: uppercase; letter-spacing: 0.08em; }
  .badge-dot { width: 6px; height: 6px; background: #7c3aed; border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }
  h1 { font-size: clamp(40px, 6vw, 72px); font-weight: 900; text-align: center; line-height: 1.05; letter-spacing: -0.03em; max-width: 720px; margin-bottom: 20px; }
  h1 span { background: linear-gradient(135deg, #e8437a 0%, #7c3aed 55%, #f97316 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .subtitle { font-size: 18px; color: rgba(255,255,255,0.55); text-align: center; max-width: 480px; line-height: 1.6; margin-bottom: 48px; }
  .login-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; }
  .input-group { margin-bottom: 16px; }
  label { display: block; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.6); margin-bottom: 8px; }
  input { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 12px 16px; color: #fff; font-size: 15px; font-family: inherit; outline: none; }
  .btn-primary { width: 100%; background: linear-gradient(135deg, #e8437a, #7c3aed); border: none; border-radius: 10px; padding: 14px; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; }
  .card-footer { text-align: center; margin-top: 20px; font-size: 13px; color: rgba(255,255,255,0.4); }
  .card-footer a { color: #a78bfa; text-decoration: none; }
  .stats { display: flex; gap: 40px; margin-top: 64px; }
  .stat { text-align: center; }
  .stat-val { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #e8437a, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .stat-lbl { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 4px; }
</style>
</head>
<body>
<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<nav>
  <a href="https://www.influencerglobalagency.com" class="logo">IGA</a>
  <a href="https://www.influencerglobalagency.com" class="nav-link">Back to main site</a>
</nav>
<main class="main">
  <div class="badge"><span class="badge-dot"></span>Creator Platform</div>
  <h1>Your <span>Creator</span> Dashboard</h1>
  <p class="subtitle">Access your campaigns, track performance, and manage brand partnerships all in one place.</p>
  <div class="login-card">
    <div class="input-group"><label>Email address</label><input type="email" placeholder="you@example.com"></div>
    <div class="input-group"><label>Password</label><input type="password" placeholder="password"></div>
    <button class="btn-primary">Sign In to IGA</button>
    <div class="card-footer">No account? <a href="https://form.influencerglobalagency.com">Apply now</a></div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-val">800+</div><div class="stat-lbl">Active Creators</div></div>
    <div class="stat"><div class="stat-val">$2M+</div><div class="stat-lbl">Creator Earnings</div></div>
    <div class="stat"><div class="stat-val">150+</div><div class="stat-lbl">Brand Partners</div></div>
  </div>
</main>
</body>
</html>
