<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Rae Basics — Powered by IGA</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:#0a0a0f;color:#fff;-webkit-font-smoothing:antialiased;overflow:hidden}
:root{--pink:#e8437a;--purple:#7c3aed;--orange:#f97316;--grad:linear-gradient(135deg,#e8437a 0%,#7c3aed 55%,#f97316 100%)}
.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0}
.g1{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,.2) 0%,transparent 70%);top:-80px;left:50%;transform:translateX(-50%)}
.g2{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(232,67,122,.12) 0%,transparent 70%);bottom:-60px;right:-40px}
.wrap{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:16px}
.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.2);border-radius:100px;padding:6px 16px;font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#a78bfa;margin-bottom:32px}
h1{font-size:clamp(44px,8vw,84px);font-weight:900;letter-spacing:-2px;line-height:1;margin-bottom:20px}
.grad-text{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
p{font-size:clamp(15px,2vw,18px);color:rgba(255,255,255,.5);max-width:460px;line-height:1.7;margin-bottom:40px}
.links{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.link-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border-radius:100px;font-size:13px;font-weight:600;text-decoration:none;transition:all .2s}
.link-primary{background:var(--grad);color:#fff}
.link-primary:hover{opacity:.85;transform:translateY(-1px)}
.link-ghost{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.7)}
.link-ghost:hover{border-color:rgba(255,255,255,.25);color:#fff}
</style>
</head>
<body>
<div class="bg-glow"><div class="g1"></div><div class="g2"></div></div>
<div class="wrap">
  <div class="eyebrow">An IGA Brand</div>
  <div class="badge">raebasics.com</div>
  <h1><span class="grad-text">Rae Basics</span></h1>
  <p>Elevated essentials for everyday life. An IGA-managed lifestyle brand built for real people.</p>
  <div class="links">
    <a class="link-btn link-primary" href="https://raebasics.com" target="_blank">Visit raebasics.com</a>
    <a class="link-btn link-ghost" href="https://www.influencerglobalagency.com">Back to IGA</a>
  </div>
</div>
</body>
</html>
